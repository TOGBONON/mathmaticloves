<script >

  const protocol = window.location.protocol === "https:" ? "wss://" : "ws://";
    console.log("Before socket");
    const socket = new WebSocket(
        protocol + window.location.host + '/ws/call/'
    );
    console.log("After socket", socket);

    socket.onopen = function() {
        console.log("✅ Teacher WebSocket connected");
    };

    socket.onmessage = function(e) {
        console.log("📩 RAW MESSAGE:", e.data); 
        const data = JSON.parse(e.data);
        console.log("📩 PARSED:", data); 

        if (data.type === "incoming_call") {
            console.log("📞 INCOMING CALL TRIGGERED");
            showIncomingCall(data);
        }
    };

    socket.onclose = function() {
        console.log("❌ WebSocket disconnected");
    };

    function showIncomingCall(data) {
        const audio = new Audio("{% static 'src/assets/personel/med/ringtone1.mp3' %}");
        audio.loop = true;
        audio.play();

        const popup = document.createElement('div');
        popup.innerHTML = `
            <div style="
                position: fixed;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: white;
                padding: 20px;
                border-radius: 10px;
                box-shadow: 0 5px 20px rgba(0,0,0,0.3);
                z-index: 9999;
                text-align: center;
            ">
                <h5>📞 Incoming Call</h5>
                <p>${data.student_name}</p>

                <button id="acceptCall" style="background: green; color: white;">Accept</button>
                <button id="declineCall" style="background: red; color: white;">Decline</button>
            </div>
        `;

        document.body.appendChild(popup);

        document.getElementById("acceptCall").onclick = function() {
            audio.pause();
            window.location.href = `/chat/${data.call_id}/`;
        };

        document.getElementById("declineCall").onclick = function() {
            audio.pause();
            popup.remove();
        };
    }

</script>
